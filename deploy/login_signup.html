<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup/Login</title>

    <link rel="stylesheet" href="CSS/login_signup.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

    <section class="auth-page">

        <div class="auth-container">

            <!-- Left Side -->

            <div class="auth-info">

                <div class="logo">
                    <p>
                        <span class="l1">note</span>
                        <span class="l2">Store</span>
                    </p>
                </div>

                <p class="logo-subtext">
                    Study smarter. Earn from your notes.
                </p>

            </div>

            <!-- Right Side -->

            <div class="auth-card">

                <h2 id="auth-title">Create Your Account</h2>

                <p id="auth-subtitle">
                    Join us today!
                </p>

                <form id="authForm">

                    <div class="form-group" id="name-field">
                        <label>Full Name</label>
                        <input
                            type="text"
                            id="name"
                            placeholder="Your name"
                        >
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="you@example.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input
                            type="password"
                            id="password"
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <button
                        type="submit"
                        class="auth-btn"
                    >
                        Sign Up
                    </button>

                </form>

                <p class="auth-switch">
                    Already have an account?
                    <span id="toggle-auth">Login</span>
                </p>

            </div>

        </div>

    </section>

    <script src="JS/login_signup.js"></script>

</body>

</html>
