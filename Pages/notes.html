<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="../CSS/notes.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <section class="notes-page">

    <!-- Header -->
    <div class="notes-header">
        <div class="notes-header-left">
            <h1>Browse/Sell Notes</h1>
            <p>High-quality notes shared by top-performing students.</p>
        </div>
        <div class="notes-header-right">

            <button class="upload-note-btn">
                Upload Note
            </button>

            <button id="logoutBtn">
                Logout
            </button>

        </div>
    </div>

    <!-- Filters -->
    <div class="notes-filters">

        <input
            type="text"
            id="searchInput"
            placeholder="Search subject or keyword"
        >

        <select id="semesterFilter">

            <option value="all">
                All Semesters
            </option>

            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
            <option value="3">Semester 3</option>
            <option value="4">Semester 4</option>
            <option value="5">Semester 5</option>
            <option value="6">Semester 6</option>
            <option value="7">Semester 7</option>
            <option value="8">Semester 8</option>

        </select>

        <select id="subjectFilter">

            <option value="all">
                All Subjects
            </option>

        </select>

    </div>

    <!-- Notes Grid -->
    <div class="notes-grid" id="notesGrid">


    </div>

    </section>

            <!-- Upload Notes Modal -->
        <div class="modal-overlay" id="uploadModal">
        <div class="modal-box">

            <div class="modal-header">
            <h3 id="modalTitle">
                Upload Notes
            </h3>
            <span class="close-modal" id="closeUpload">&times;</span>
            </div>

            <form class="upload-form" id="uploadForm">

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="Engineering Mathematics II">
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="Mathematics">
                </div>

                <div class="form-group">
                    <label>Semester</label>
                    <input type="number" id="semester" placeholder="2">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="4"
                        placeholder="Complete handwritten notes"></textarea>
                </div>

                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="price" placeholder="99">
                </div>
                <div class="form-group">
                    <label>PDF File</label>
                    <input
                        type="file"
                        id="pdf"
                        accept=".pdf"
                    >
                </div>
                <button type="submit" class="primary-upload-CTA" id="submitBtn">
                    Upload Notes
                </button>

            </form>
        </div>
        </div>
    

    <script src="../JS/notes.js"></script>
</body>
</html>
